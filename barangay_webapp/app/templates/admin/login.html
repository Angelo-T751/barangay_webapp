<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay AINS - Admin Portal</title>
    <link rel="stylesheet" href="../../static/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-wrapper">
        <img src="../../static/images/bg1.png" alt="City Skyline" class="bg-silhouette">
    </div>

    <div class="viewport-wrapper uniform-animation">
        <header class="system-header">
            <div class="brand-row">
                <img src="../../static/images/logo.png" alt="Logo" class="logo-img">
                <h1 class="brand-name">Barangay AINS</h1>
            </div>
            <p class="portal-tag">ADMIN PORTAL</p>
        </header>

        <main class="login-card" id="loginCard">
            <h2>Hello, Admin!</h2>
            <p class="sub-text">Sign in to manage Barangay Operations</p>

            <form id="loginForm" novalidate>
                <div class="input-field">
                    <label>Email</label>
                    <div class="input-control">
                        <i class="fa-regular fa-envelope field-icon"></i>
                        <input type="email" id="email" placeholder="admin@ains.com">
                    </div>
                </div>

                <div class="input-field">
                    <label>Password</label>
                    <div class="input-control">
                        <i class="fa-solid fa-lock field-icon"></i>
                        <input type="password" id="password">
                        <i class="fa-regular fa-eye-slash toggle-eye" id="togglePass"></i>
                    </div>
                </div>

                <div class="meta-row">
                    <div class="error-zone">
                        <span id="errorMessage">*Incorrect login credentials. Please try again.</span>
                    </div>
                    <label class="remember-label">
                        <input type="checkbox" id="remember">
                        <span class="custom-check"></span>
                        Remember Me?
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-login">Log In</button>
            </form>

            <div class="separator"></div>
            <p class="reg-text">No account yet? <a href="register.html" class="link-underline">Register here</a></p>
        </main>

        <div class="external-btn-group">
            <a href="index.html" class="btn-primary btn-apply-now">Apply now!</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const togglePass = document.getElementById('togglePass');
        const errorMsg = document.getElementById('errorMessage');
        const loginCard = document.getElementById('loginCard');

        const ADMIN_EMAIL = "admin@ains.com";
        const ADMIN_PASS = "admin123";

        togglePass.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            togglePass.className = isPass ? 'fa-regular fa-eye toggle-eye' : 'fa-regular fa-eye-slash toggle-eye';
        });

        // Function to reset icons visibility
        function resetIcons() {
            document.querySelectorAll('.field-icon').forEach(icon => {
                icon.style.opacity = '1';
            });
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() {
                const icon = this.previousElementSibling;
                if(icon && icon.classList.contains('field-icon')) {
                    icon.style.opacity = this.value.length > 0 ? '0' : '1';
                }
                errorMsg.style.display = 'none';
                loginCard.classList.remove('shake');
            });
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (emailInput.value === ADMIN_EMAIL && passInput.value === ADMIN_PASS) {
                document.body.style.transition = "opacity 0.5s ease";
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                // Trigger Shake and Error
                loginCard.classList.remove('shake');
                void loginCard.offsetWidth; 
                loginCard.classList.add('shake');
                errorMsg.style.display = 'block';

                // CLEAR FIELDS DIRECTLY
                emailInput.value = "";
                passInput.value = "";
                resetIcons(); // Bring back the icons since inputs are now empty
            }
        });
    </script>
</body>
</html>
